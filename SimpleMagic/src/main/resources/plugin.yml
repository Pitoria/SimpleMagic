name: SimpleMagic
version: 1.0.0
main: me.bray.simplemagic.SimpleMagic
api-version: '1.20'
author: Braiton

commands:
  simplemagic:
    description: SimpleMagic main command
    usage: /simplemagic
    aliases: [smagic]

permissions:
  simplemagic.command.give:
    description: Allows giving magic wands
    default: op

  simplemagic.command.reload:
    description: Allows reloading SimpleMagic files
    default: op